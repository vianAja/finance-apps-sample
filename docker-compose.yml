services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "financepass"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  app:
    build: .
    environment:
      PORT: "3000"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: financepass
      CACHE_TTL_SECONDS: "45"
      SESSION_TTL_SECONDS: "900"
      RATE_LIMIT_MAX: "5"
      RATE_LIMIT_WINDOW_SECONDS: "60"
    ports:
      - "3000:3000"
    depends_on:
      - redis

volumes:
  redis-data:
